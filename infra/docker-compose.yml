name: mele_shop

services:
  db:
    image: postgres:16-alpine
    container_name: mele_shop_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: mele_shop_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      POSTGRES_HOST: db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: shop.events
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DATABASE: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-cozy_coza}
    volumes:
      - ../myshop/media:/app/media
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: mele_shop_celery
    command: celery -A myshop worker -l info -Q celery,manual_queue,front_rubbish
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      POSTGRES_HOST: db
    volumes:
      - ../myshop/media:/app/media
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      web:
        condition: service_started
    restart: unless-stopped

  flower:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: mele_shop_flower
    command: celery -A myshop flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      rabbitmq:
        condition: service_healthy
      celery:
        condition: service_started
    restart: unless-stopped

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: mele_shop_stripe_cli
    command: listen --api-key ${STRIPE_SECRET_KEY} --forward-to http://web:8000/en/payment/webhook/ --events checkout.session.completed
    env_file:
      - .env
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mele_shop_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.0
    hostname: kafka
    container_name: mele_shop_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.9.0
    container_name: mele_shop_kafka_init
    volumes:
      - ./kafka/init-topics.sh:/init-topics.sh
    entrypoint: ["/bin/bash", "/init-topics.sh"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mele_shop_kafka_ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cozy-coza
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  kafka-rating-consumer:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: mele_shop_kafka_rating_consumer
    command: python manage.py consume_product_ratings
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: shop.events
      KAFKA_RATING_GROUP_ID: cozy-coza-rating
    depends_on:
      db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      web:
        condition: service_started
    restart: unless-stopped

  kafka-load-consumer:
    build:
      context: ./kafka
    container_name: mele_shop_kafka_load_consumer
    command: python consumer.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: load.test
      KAFKA_GROUP_ID: cozy-coza-load
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  kafka-analytics-consumer:
    build:
      context: ./kafka
    container_name: mele_shop_kafka_analytics_consumer
    command: python analytics_consumer.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: shop.events
      KAFKA_ANALYTICS_GROUP_ID: cozy-coza-analytics
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DATABASE: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-cozy_coza}
    depends_on:
      clickhouse:
        condition: service_healthy
      clickhouse-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: mele_shop_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-cozy_coza}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  clickhouse-init:
    image: curlimages/curl:8.11.0
    container_name: mele_shop_clickhouse_init
    volumes:
      - ./clickhouse/init.sql:/init.sql
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until curl -fsS "http://default:$${CLICKHOUSE_PASSWORD}@clickhouse:8123/ping"; do sleep 2; done
        curl -fsS "http://default:$${CLICKHOUSE_PASSWORD}@clickhouse:8123/" --data "CREATE DATABASE IF NOT EXISTS analytics"
        curl -fsS "http://default:$${CLICKHOUSE_PASSWORD}@clickhouse:8123/?database=analytics" --data-binary @/init.sql
        echo ClickHouse analytics schema ready.
    environment:
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-cozy_coza}
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: mele_shop_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      clickhouse-init:
        condition: service_completed_successfully
    restart: unless-stopped

  kafka-load-publisher:
    build:
      context: ./kafka
    container_name: mele_shop_kafka_load_publisher
    command: python publisher.py
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: load.test
      LOAD_PUBLISHER_PORT: 8081
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  kafka_data:
  clickhouse_data:
  grafana_data:
