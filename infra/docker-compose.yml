name: mele_shop

services:
  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: mele_shop_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    volumes:
      - ../myshop/db.sqlite3:/app/db.sqlite3
      - ../myshop/media:/app/media
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: mele_shop_celery
    command: celery -A myshop worker -l info -Q celery,manual_queue,front_rubbish
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    volumes:
      - ../myshop/db.sqlite3:/app/db.sqlite3
      - ../myshop/media:/app/media
    depends_on:
      rabbitmq:
        condition: service_healthy
      web:
        condition: service_started
    restart: unless-stopped

  flower:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: mele_shop_flower
    command: celery -A myshop flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      rabbitmq:
        condition: service_healthy
      celery:
        condition: service_started
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mele_shop_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
