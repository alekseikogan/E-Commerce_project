services:
  nginx:
    image: nginx:alpine
    container_name: mele_shop_nginx
    ports:
      - "8088:80"
    volumes:
      # active.conf — «текущий» цвет; скрипт будет подменять файл
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - ../myshop/static:/var/www/static:ro
      - ../myshop/media:/var/www/media:ro
    depends_on:
      web_blue:
        condition: service_healthy
    restart: unless-stopped

  web_blue:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: mele_shop_web_blue
    command: gunicorn myshop.wsgi:application --bind 0.0.0.0:8000 --workers 2
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      POSTGRES_HOST: db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: shop.events
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DATABASE: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-cozy_coza}
    volumes:
      - ../myshop/media:/app/media
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  web_green:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: mele_shop_web_green
    command: gunicorn myshop.wsgi:application --bind 0.0.0.0:8000 --workers 2
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      POSTGRES_HOST: db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: shop.events
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DATABASE: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-cozy_coza}
    volumes:
      - ../myshop/media:/app/media
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    profiles:
      - green
    restart: unless-stopped