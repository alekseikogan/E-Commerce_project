{% extends "shop/base.html" %}

{% block title %}Change password · Cozy Coza{% endblock %}

{% block content %}
<section class="auth-card content-card">
  <div class="section-heading">
    <div>
      <h2>Change password</h2>
      <p>Enter your current password and choose a new one.</p>
    </div>
  </div>

  <form method="post" class="auth-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="button">Update password</button>
  </form>

  <p class="auth-switch">
    <a href="{% url 'accounts:profile' %}">Back to account</a>
  </p>
</section>
{% endblock %}
